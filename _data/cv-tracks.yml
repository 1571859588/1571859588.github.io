tracks:
  agent:
    name:
      en: AI Agent
      zh: AI Agent
    description:
      en: Focus on multi-agent systems, tool-use agents, and LLM-based autonomous workflows.
      zh: 聚焦多智能体系统、工具使用智能体以及基于大语言模型的自主工作流。
    job_objective:
      en: AI Agent R&D Engineer
      zh: AI Agent 研发工程师
    research_interests:
      en:
        - Multi-Agent Systems
        - LLM Reasoning & Planning
        - Tool-Use & Function Calling
        - Agentic Workflows & Orchestration
        - Human-Agent Collaboration
      zh:
        - 多智能体系统
        - 大语言模型推理与规划
        - 工具使用与函数调用
        - 智能体工作流与编排
        - 人机协作
    internships:
      - company:
          en: ChatEDA Lab
          zh: ChatEDA
        location:
          en: China
          zh: 中国
        position:
          en: Research Intern
          zh: 研究实习生
        date:
          en: Oct. 2024 - Present
          zh: 2024.10 - 至今
        description:
          en: Research on LLM-powered multi-agent systems for Electronic Design Automation
          zh: 研究基于大语言模型的多智能体系统在电子设计自动化中的应用
        responsibilities:
          en:
            - Led the development of RAG-EDA, a full-stack RAG-based document QA system for 5 EDA tools, deployed at Empyrean Technology
            - Designed hybrid retrieval (FAISS + BM25) and FlagLLM Reranker pipeline, improving Top-5 hit rate from 60% to over 90%
            - Built multimodal QA with InternVL2/Qwen-VL and automated evaluation framework with regression testing
            - Developed an intelligent PDF parsing system for chip SPEC documents, integrating multi-tool extraction, OpenCV table recognition, and LLM-enhanced chunking
          zh:
            - 主导开发RAG-EDA全栈RAG文档问答系统，支持5款EDA工具的技术文档知识库，已在华大九天落地部署
            - 设计FAISS + BM25混合检索与FlagLLM Reranker精排流水线，Top-5命中率从60%提升至90%以上
            - 构建基于InternVL2/Qwen-VL的多模态问答能力，并搭建覆盖召回率、精排与端到端准确率的自动化评测框架
            - 开发面向芯片SPEC文档的PDF智能解析系统，集成多工具协同提取、OpenCV表格识别与LLM增强分块策略
    projects:
      - name:
          en: 'RAG-EDA: LLM-Powered Document QA System for EDA Tools'
          zh: RAG-EDA：基于大语言模型的EDA工具文档问答系统
        tech: Python, PyTorch, LangChain, FAISS, Streamlit
        date:
          en: 2024.10 - 2025.07
          zh: 2024.10 - 2025.07
        role:
          en: Core Developer
          zh: 核心开发者
        description:
          en: A full-stack RAG-based QA system for EDA tool documentation, deployed at Empyrean Technology
          zh: 面向EDA工具文档的全栈RAG问答系统，已在华大九天落地部署
        highlights:
          en:
            - >-
              Designed and implemented a full-stack RAG pipeline (parsing → FAISS+BM25 hybrid retrieval → FlagLLM Reranker → Qwen1.5-14B generation) for 5 EDA tool knowledge bases; deployed at
              Empyrean Technology
            - Built multi-channel retrieval with deduplication and metadata filtering, combined with fine-tuned Reranker re-scoring, improving recall and Top-5 hit rate from 60% to over 90%
            - Fine-tuned Qwen1.5-14B with CoT-style prompts and answer self-verification; integrated InternVL2/Qwen-VL for multimodal image-text joint QA
            - Built Streamlit frontend + MySQL backend with user auth, multi-KB switching, and chat history; containerized with Docker for one-click deployment
            - Designed automated evaluation framework covering retrieval recall, reranker accuracy, and end-to-end QA with automatic report generation
          zh:
            - 设计并实现完整RAG流水线（文档解析 → FAISS+BM25混合检索 → FlagLLM Reranker精排 → Qwen1.5-14B生成），支持5款EDA工具知识库，已在华大九天落地部署
            - 构建多路召回 + 去重与Metadata过滤 + Reranker精排打分策略，检索召回率与Top-5命中率从60%提升至90%以上
            - 基于Qwen1.5-14B领域微调，设计CoT风格Prompt与答案自检机制；集成InternVL2/Qwen-VL实现图文联合问答
            - 搭建Streamlit前端 + MySQL后端，支持用户登录、多知识库切换、聊天历史，Docker一键部署
            - 设计自动化评测框架，覆盖检索召回率、重排准确率、端到端问答准确率，支持实验报告自动生成
    skills:
      - category:
          en: Programming Languages
          zh: 编程语言
        items: Python, C/C++, Java
      - category:
          en: LLM & Agent Frameworks
          zh: 大模型与智能体框架
        items: LangChain, AutoGen, CrewAI, OpenAI API, Prompt Engineering
      - category:
          en: Tools & Infrastructure
          zh: 工具与基础设施
        items: PyTorch, Docker, Git, LaTeX
  infra:
    name:
      en: AI Infrastructure
      zh: AI 基础设施
    description:
      en: Focus on LLM inference optimization, CUDA kernel development, GPU architecture, and distributed serving systems.
      zh: 聚焦大模型推理优化、CUDA算子开发、GPU体系结构与分布式推理系统。
    job_objective:
      en: AI Infrastructure / Inference Optimization Engineer
      zh: AI Infra / 推理优化工程师
    research_interests:
      en:
        - LLM Inference Optimization (vLLM, PagedAttention)
        - CUDA Kernel Development & GPU Performance Tuning
        - Distributed Inference & Collective Communication (NCCL)
        - Retrieval-Augmented Generation (RAG)
        - ML Systems & Containerized Deployment
      zh:
        - 大模型推理优化（vLLM / PagedAttention）
        - CUDA算子开发与GPU性能调优
        - 分布式推理与集合通信（NCCL）
        - 检索增强生成（RAG）
        - 机器学习系统与容器化部署
    internships:
      - company:
          en: ChatEDA Lab
          zh: ChatEDA
        location:
          en: China
          zh: 中国
        position:
          en: Research Intern (AI Infrastructure)
          zh: 研究实习生（AI基础设施方向）
        date:
          en: Oct. 2024 - Present
          zh: 2024.10 - 至今
        description:
          en: Built production-grade RAG infrastructure and high-throughput document processing pipelines for EDA domain, deployed at Empyrean Technology
          zh: 为EDA领域构建生产级RAG基础设施与高吞吐文档处理流水线，已在华大九天落地部署
        responsibilities:
          en:
            - >-
              Architected and containerized a full-stack RAG inference system (FAISS+BM25 hybrid retrieval → LLM re-rank → Qwen1.5-14B generation), serving 10K+ documents across 5 EDA tools; deployed
              with Docker (Streamlit + MySQL + retrieval engine) at Empyrean Technology
            - Designed multi-channel retrieval with deduplication and metadata filtering; improved Top-5 recall from 60% to 90%+ through fine-tuned re-ranker scoring
            - Built automated evaluation framework covering retrieval recall, re-ranker accuracy, and end-to-end QA metrics with regression testing and auto-generated reports
            - Developed high-throughput PDF parsing pipeline with multi-tool orchestration (MinerU + pdf2kg + OpenCV), configurable Flask orchestration, and auto-verification loop
          zh:
            - 架构并容器化全栈RAG推理系统（FAISS+BM25混合检索 → LLM精排 → Qwen1.5-14B生成），服务10K+文档与5款EDA工具；通过Docker容器化（Streamlit + MySQL + 检索引擎）在华大九天完成生产部署
            - 设计多路召回 + 去重 + 元数据过滤的混合检索策略，微调Reranker精排模型，Top-5召回率从60%提升至90%以上
            - 搭建覆盖检索召回率、重排准确率、端到端QA指标的自动化评测框架，支持回归测试与报告自动生成
            - 开发高吞吐PDF解析流水线，集成MinerU + pdf2kg + OpenCV多工具协同、Flask可配置编排与自动验证修复闭环
    projects:
      - name:
          en: 'RAG-EDA: Scalable Document QA Infrastructure for EDA Tools'
          zh: RAG-EDA：面向EDA工具的可扩展文档问答基础设施
        tech: Python, PyTorch, LangChain, FAISS, Streamlit, Docker, MySQL
        date:
          en: 2024.10 - 2025.07
          zh: 2024.10 - 2025.07
        role:
          en: Core Developer
          zh: 核心开发者
        description:
          en: A production-grade, containerized RAG system with hybrid retrieval, deployed at Empyrean Technology
          zh: 面向生产环境的容器化RAG系统，支持混合检索，已在华大九天落地部署
        highlights:
          en:
            - Architected full-stack RAG pipeline (parsing -> FAISS+BM25 hybrid retrieval -> FlagLLM Reranker -> Qwen1.5-14B) for 5 tool knowledge bases
            - Designed multi-channel retrieval with deduplication and metadata filtering; fine-tuned Reranker for domain-specific re-scoring, boosting Top-5 hit rate from 60% to 90%+
            - Built monitoring and automated evaluation framework covering retrieval recall, reranker accuracy, and end-to-end QA metrics with auto-generated reports
            - Containerized entire stack (Streamlit frontend, MySQL backend, retrieval engine) with Docker; implemented user auth, multi-KB switching, and session management
          zh:
            - 架构全栈RAG流水线（解析 -> FAISS+BM25混合检索 -> FlagLLM Reranker -> Qwen1.5-14B），服务5个工具知识库
            - 设计多路召回 + 去重 + 元数据过滤策略，微调Reranker进行领域精排，Top-5命中率从60%提升至90%以上
            - 搭建监控与自动化评测框架，覆盖检索召回率、重排准确率、端到端QA指标，自动生成评测报告
            - Docker容器化完整技术栈（Streamlit前端、MySQL后端、检索引擎）；实现用户认证、多知识库切换与会话管理
      - name:
          en: High-Throughput PDF Parsing Pipeline for EDA Documents
          zh: 面向EDA文档的高吞吐PDF解析流水线
        tech: Python, OpenCV, Flask, MinerU, Docker
        date:
          en: 2026.01 - 2026.05
          zh: 2026.01 - 2026.05
        role:
          en: Core Developer
          zh: 核心开发者
        description:
          en: A configurable, high-throughput PDF parsing pipeline with multi-tool orchestration and auto-verification
          zh: 可配置的高吞吐PDF解析流水线，支持多工具编排与自动验证
        highlights:
          en:
            - Designed unified JSON Schema IR layer supporting 6 element types; orchestrated MinerU and pdf2kg parsers with bbox merging for robust extraction
            - Built OpenCV table recognition with cell merging and cross-page stitching (Markdown/HTML output); designed caption-figure association via font style analysis
            - Implemented LLM-enhanced chunking with ancestor summaries and token budget control; dual outline recognition via PDF bookmarks + font-size heuristics
            - Deployed configurable Flask pipeline with Docker; built auto-verification loop to detect and re-parse missing elements
          zh:
            - 设计基于JSON Schema的统一IR层，支持6类文档元素；编排MinerU与pdf2kg解析器，通过bbox合并实现多工具协同
            - 构建基于OpenCV的表格识别，支持单元格合并与跨页拼接（Markdown/HTML输出）；设计字体样式分析的图表-标题关联
            - 实现LLM增强分块策略，包含祖先章节摘要与token预算控制；PDF书签 + 字体大小的双重大纲识别
            - 部署Flask配置化流水线 + Docker；构建自动验证循环以检测并重新解析缺失元素
      - name:
          en: LLM Inference Benchmarking & vLLM Source Analysis
          zh: 大模型推理框架基准测试与vLLM源码分析
        tech: vLLM, SGLang, PyTorch, Qwen2.5-7B, Nsight, A100
        date:
          en: 2026.07 - Present
          zh: 2026.07 - 至今
        role:
          en: Self-driven Project
          zh: 个人自驱项目
        description:
          en: Deploying and benchmarking mainstream LLM inference frameworks, reading vLLM scheduler & PagedAttention source code
          zh: 部署并基准测试主流大模型推理框架，阅读vLLM调度器与PagedAttention核心源码
        highlights:
          en:
            - Deployed vLLM and SGLang on A100 GPUs (8xA100 40G), running Qwen2.5-7B throughput/latency benchmarks across batch sizes (1-64)
            - Reading vLLM core scheduler (vllm/core/scheduler.py) and PagedAttention KV cache management; documenting the continuous batching mechanism
            - Profiling GPU utilization with Nsight Systems and nvidia-smi; analyzing prefill (compute-bound) vs decode (memory-bound) phase bottlenecks
            - 'Output: benchmark report with latency-throughput tradeoff curves, memory usage analysis, and framework selection guidance'
          zh:
            - 在8xA100 40G集群上部署vLLM与SGLang，对Qwen2.5-7B执行吞吐/延迟全维度基准测试（batch size 1-64），绘制延迟-吞吐权衡曲线
            - 阅读vLLM核心调度器源码（vllm/core/scheduler.py）与PagedAttention KV Cache管理机制，梳理continuous batching调度流程
            - 使用Nsight Systems + nvidia-smi进行GPU利用率剖析，分析prefill（计算密集型）与decode（访存密集型）阶段瓶颈
            - 产出：含延迟-吞吐tradeoff曲线、显存占用分析、框架选型建议的完整基准报告
      - name:
          en: CUDA Kernel Optimization Lab (llm.c Study)
          zh: CUDA Kernel优化实验（基于llm.c源码研读）
        tech: CUDA C/C++, Nsight Compute, cuBLAS, llm.c, A100
        date:
          en: 2026.07 - Present
          zh: 2026.07 - 至今
        role:
          en: Self-driven Project
          zh: 个人自驱项目
        description:
          en: Studying GPU kernel optimization through Karpathy's llm.c and hands-on CUDA kernel development
          zh: 通过Karpathy llm.c源码研读与CUDA Kernel动手实践，系统学习GPU算子优化
        highlights:
          en:
            - 'Implemented and optimized core CUDA kernels: tiled matrix multiplication (shared memory + coalesced access), online softmax, and layer normalization'
            - 'Profiled with Nsight Compute: analyzed occupancy, shared memory bank conflicts, and global memory throughput; achieved ~80% of cuBLAS matmul throughput on tiled version'
            - 'Reading llm.c GPT-2 training source (train_gpt2.cu): tracing the full forward pass (matmul -> attention -> residual) to understand transformer-to-GPU-kernel mapping'
            - Documented optimization journey with roofline plots and before/after benchmark tables; GitHub repo with build instructions for A100 (sm_90)
          zh:
            - 实现并优化核心CUDA Kernel：分块矩阵乘法（共享内存 + 合并访存）、在线Softmax、LayerNorm归一化，每类算子从naive到优化逐级迭代
            - 使用Nsight Compute剖析：分析occupancy、共享内存bank conflict与全局内存吞吐；分块matmul在A100上达到cuBLAS约80%的吞吐
            - 研读Karpathy llm.c中GPT-2训练CUDA源码（train_gpt2.cu），梳理forward pass中matmul->attention->残差连接如何映射至GPU kernel
            - 整理优化笔记：含Roofline分析图与优化前后对照表，GitHub仓库提供sm_90 A100编译运行指令
    skills:
      - category:
          en: Programming Languages
          zh: 编程语言
        items: Python, C/C++, CUDA C, SQL
      - category:
          en: GPU & Inference Stack
          zh: GPU与推理基础设施
        items: CUDA, PyTorch, vLLM, NCCL, FAISS, Nsight Compute, GPU Architecture
      - category:
          en: Engineering & DevOps
          zh: 工程与运维
        items: Docker, Linux, Git, Conda, Flask, MySQL, CI/CD
