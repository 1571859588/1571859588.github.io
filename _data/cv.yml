# Projects
# Each project can have:
# - name: Project name (en/zh)
# - date: Time period (en/zh)
# - role: Your role in the project (en/zh)
# - description: Brief description (en/zh)
# - highlights: Key achievements or responsibilities (en/zh)
projects:
  - name:
      en: "RAG-EDA: LLM-Powered Document QA System for EDA Tools"
      zh: "RAG-EDA：基于大语言模型的EDA工具文档问答系统"
    tech: "Python, PyTorch, LangChain, FAISS, Streamlit"
    date:
      en: "2024.10 - 2025.07"
      zh: "2024.10 - 2025.07"
    role:
      en: "Core Developer"
      zh: "核心开发者"
    description:
      en: "A full-stack RAG-based QA system for EDA tool documentation, deployed at Empyrean Technology"
      zh: "面向EDA工具文档的全栈RAG问答系统，已在华大九天落地部署"
    highlights:
      en:
        - "Designed and implemented a full-stack RAG pipeline (parsing → FAISS+BM25 hybrid retrieval → FlagLLM Reranker → Qwen1.5-14B generation) for 5 EDA tool knowledge bases; deployed at Empyrean Technology"
        - "Built multi-channel retrieval with deduplication and metadata filtering, combined with fine-tuned Reranker re-scoring, improving recall and Top-5 hit rate from 60% to over 90%"
        - "Fine-tuned Qwen1.5-14B with CoT-style prompts and answer self-verification; integrated InternVL2/Qwen-VL for multimodal image-text joint QA"
        - "Built Streamlit frontend + MySQL backend with user auth, multi-KB switching, and chat history; containerized with Docker for one-click deployment"
        - "Designed automated evaluation framework covering retrieval recall, reranker accuracy, and end-to-end QA with automatic report generation"
      zh:
        - "设计并实现完整RAG流水线（文档解析 → FAISS+BM25混合检索 → FlagLLM Reranker精排 → Qwen1.5-14B生成），支持5款EDA工具知识库，已在华大九天落地部署"
        - "构建多路召回 + 去重与Metadata过滤 + Reranker精排打分策略，检索召回率与Top-5命中率从60%提升至90%以上"
        - "基于Qwen1.5-14B领域微调，设计CoT风格Prompt与答案自检机制；集成InternVL2/Qwen-VL实现图文联合问答"
        - "搭建Streamlit前端 + MySQL后端，支持用户登录、多知识库切换、聊天历史，Docker一键部署"
        - "设计自动化评测框架，覆盖检索召回率、重排准确率、端到端问答准确率，支持实验报告自动生成"

  - name:
      en: "Intelligent PDF Parsing System for EDA Chip Design Documents"
      zh: "面向EDA芯片设计文档的PDF智能解析系统"
    tech: "Python, OpenCV, Flask, MinerU, Docker"
    date:
      en: "2026.01 - 2026.05"
      zh: "2026.01 - 2026.05"
    role:
      en: "Core Developer"
      zh: "核心开发者"
    description:
      en: "A complete PDF parsing pipeline for chip SPEC and EDA documents, supporting structured extraction and knowledge base construction; developed at ChatEDA Lab"
      zh: "面向芯片SPEC文档和EDA技术文档的完整PDF解析流水线，支持结构化提取与知识库构建；在ChatEDA实验室完成开发"
    highlights:
      en:
        - "Designed a unified IR layer based on JSON Schema supporting 6 element types; integrated MinerU (deep learning) and pdf2kg (rule-based) parsers with bbox merging for robust layout extraction"
        - "Implemented OpenCV-based table recognition with cell merging and cross-page stitching (Markdown/HTML output), avoiding LLM costs; designed caption-figure association via font style analysis"
        - "Built dual outline recognition (PDF bookmarks + font-size analysis) for automatic chapter hierarchy inference; designed LLM-enhanced chunking with ancestor summaries and token budget control"
        - "Deployed configurable Flask pipeline with Docker; built auto-verification to detect and re-parse missing elements; supported mixed page-size SPEC documents (LPDDR5/DDR6)"
      zh:
        - "设计基于JSON Schema的统一IR层，支持6类文档元素；集成MinerU深度学习解析器与pdf2kg规则提取器，通过bbox合并实现多工具协同提取"
        - "实现基于OpenCV的表格识别，支持单元格合并与跨页拼接（Markdown/HTML输出），避免LLM成本；设计基于字体样式分析的图表-标题智能关联"
        - "构建PDF书签 + 字体大小的双重大纲识别策略，自动推断章节层级；设计LLM增强分块策略，生成祖先章节摘要并支持token预算控制"
        - "搭建Flask配置化流水线 + Docker部署；构建自动化验证与修复流程，保障输出完整性；支持LPDDR5/DDR6等混合页面尺寸SPEC文档"

