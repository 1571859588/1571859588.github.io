# Projects
# Each project can have:
# - name: Project name (en/zh)
# - date: Time period (en/zh)
# - role: Your role in the project (en/zh)
# - description: Brief description (en/zh)
# - highlights: Key achievements or responsibilities (en/zh)
projects:
  - name:
      en: "MAEDA-Flow: LLM-Powered Document QA System for EDA Tools"
      zh: "MAEDA-Flow：基于大语言模型的EDA工具文档问答系统"
    tech: "Python, PyTorch, LangChain, FAISS, Streamlit"
    date:
      en: "2024.10 - 2025.07"
      zh: "2024.10 - 2025.07"
    role:
      en: "Core Developer"
      zh: "核心开发者"
    description:
      en: "A full-stack RAG-based QA system for EDA tool documentation, Empyrean Technology (Internship)"
      zh: "华大九天（实习）· 面向EDA工具文档的全栈RAG问答系统"
    highlights:
      en:
        - "Designed and implemented a full-stack RAG-based QA system covering document parsing, vectorized retrieval, reranking, and LLM generation, supporting 5 EDA tool documentation knowledge bases (XTop, Qualib, Skipper, ALPS, OpenROAD)"
        - "Built a hybrid retrieval engine combining FAISS (semantic) and BM25 (keyword) with deduplication and metadata-based filtering, improving recall from 60% to over 90%"
        - "Integrated and fine-tuned FlagLLM Reranker for candidate document re-scoring with intelligent token-budget truncation, improving Top-5 hit rate from 60% to over 90%"
        - "Fine-tuned Qwen1.5-14B for the EDA domain with CoT-style prompt templates including reference relevance analysis; implemented answer quality self-verification with automatic retry mechanism"
        - "Developed multimodal QA capability by integrating InternVL2-26B / Qwen-VL vision-language models, enabling image-assisted query understanding for joint image-text retrieval QA"
        - "Built Streamlit interactive frontend with MySQL persistence layer, supporting user authentication, multi-KB switching, chat history, and user feedback collection; containerized with Docker for one-click deployment"
        - "Designed an automated evaluation framework with regression test scripts covering retrieval recall, reranker accuracy, and end-to-end QA accuracy, with automatic report generation"
      zh:
        - "设计并实现了完整的RAG全栈问答系统，覆盖文档解析、向量化检索、重排序和大模型生成四个核心模块，支持5款EDA工具（XTop、Qualib、Skipper、ALPS、OpenROAD）的技术文档知识库"
        - "构建了FAISS + BM25混合检索引擎，通过语义向量检索和关键词检索的多路召回策略，并结合去重与Metadata过滤机制，召回率从60%提升至90%以上"
        - "集成并微调了FlagLLM Reranker重排序模块，对候选文档进行精排打分，实现基于token预算和文档来源的智能截断策略，Top-5命中率从60%提升至90%以上"
        - "基于Qwen1.5-14B进行领域微调，设计了包含参考资料相关性分析和结构化回答的CoT风格Prompt模板，内置答案质量自检和自动重试机制"
        - "开发了多模态文档问答功能，集成InternVL2-26B / Qwen-VL视觉语言模型，支持用户上传截图辅助问题理解，实现图文联合检索问答"
        - "搭建了Streamlit交互式前端 + MySQL持久化后端，实现用户登录、多知识库切换、聊天历史记录、用户反馈收集等完整产品功能，支持Docker一键部署"
        - "设计了自动化评测框架，编写了覆盖检索召回率、重排准确率、端到端问答准确率的回归测试脚本，支持实验结果自动生成报告"

  - name:
      en: "Brain Tumor Segmentation with SAM-DRA-UNet"
      zh: "基于SAM-DRA-UNet的脑肿瘤分割"
    date:
      en: "2024.06 - 2024.09"
      zh: "2024.06 - 2024.09"
    role:
      en: "Research Contributor"
      zh: "研究贡献者"
    description:
      en: "Enhanced U-Net framework integrating knowledge distillation and transfer learning"
      zh: "集成知识蒸馏和迁移学习的增强U-Net框架"
    highlights:
      en:
        - "Contributed to the U-Net framework enhancement"
        - "Assisted with knowledge distillation implementation"
        - "Participated in experimental validation on medical imaging datasets"
      zh:
        - "参与U-Net框架的增强工作"
        - "协助实现知识蒸馏模块"
        - "在医学影像数据集上进行实验验证"

