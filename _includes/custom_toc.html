<!-- Custom TOC floating aside -->
<aside class="custom-toc-aside">
  <nav class="custom-toc-container">
    <header class="custom-toc-header">
      <h4 class="custom-toc-title">
        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M496 384H160v-16c0-8.8-7.2-16-16-16h-32c-8.8 0-16 7.2-16 16v16H16c-8.8 0-16 7.2-16 16v32c0 8.8 7.2 16 16 16h80v16c0 8.8 7.2 16 16 16h32c8.8 0 16-7.2 16-16v-16h336c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16zM496 224H160v-16c0-8.8-7.2-16-16-16h-32c-8.8 0-16 7.2-16 16v16H16c-8.8 0-16 7.2-16 16v32c0 8.8 7.2 16 16 16h80v16c0 8.8 7.2 16 16 16h32c8.8 0 16-7.2 16-16v-16h336c8.8 0 16-7.2 16-16v-32c0-8.8-7.2-16-16-16zM496 64H160V48c0-8.8-7.2-16-16-16h-32c-8.8 0-16 7.2-16 16v16H16C7.2 64 0 71.2 0 80v32c0 8.8 7.2 16 16 16h80v16c0 8.8 7.2 16 16 16h32c8.8 0 16-7.2 16-16v-16h336c8.8 0 16-7.2 16-16V80c0-8.8-7.2-16-16-16z"></path></svg>
        Table of Contents
      </h4>
    </header>
    <div id="dynamic-toc" class="dynamic-toc-menu">
      <!-- Generated dynamically by JavaScript -->
    </div>
  </nav>
</aside>

<style>
  /* Fixed floating TOC container */
  .custom-toc-aside {
    display: none;
  }

  @media screen and (min-width: 1200px) {
    .custom-toc-aside {
      display: block;
      position: fixed;
      right: max(20px, calc(50vw - 650px)); /* Keeps it nicely bounded next to content max-width */
      top: 100px;
      width: 250px;
      max-height: calc(100vh - 140px);
      z-index: 1000;
    }
  }

  .custom-toc-container {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 16px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #cbd5e1 transparent;
    transition: all 0.3s ease;
  }

  /* Scrollbar Styling */
  .custom-toc-container::-webkit-scrollbar {
    width: 4px;
  }
  .custom-toc-container::-webkit-scrollbar-thumb {
    background-color: #cbd5e1;
    border-radius: 4px;
  }

  .custom-toc-header {
    margin-bottom: 12px;
  }

  .custom-toc-title {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #475569;
    margin: 0 0 12px 0;
    padding-bottom: 8px;
    border-bottom: 2px solid #f1f5f9;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .custom-toc-title svg {
    color: #3b82f6;
    font-size: 1rem;
  }

  /* TOC Dynamic Menu */
  .dynamic-toc-menu ul {
    list-style: none !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  .dynamic-toc-menu li {
    margin: 4px 0 !important;
    padding: 0 !important;
    list-style: none !important;
  }

  /* Base TOC Link */
  .dynamic-toc-menu .toc-link {
    display: block;
    color: #64748b;
    font-size: 0.8rem;
    font-weight: 500;
    line-height: 1.4;
    padding: 6px 12px;
    text-decoration: none !important;
    border-left: 2px solid transparent;
    transition: all 0.2s ease-in-out;
  }

  /* Hover micro-animation */
  .dynamic-toc-menu .toc-link:hover {
    color: #0f172a;
    background: #f8fafc;
    border-radius: 4px;
  }

  /* Active state highlight */
  .dynamic-toc-menu .toc-link.active {
    color: #3b82f6;
    font-weight: 600;
    border-left-color: #3b82f6;
    background: #eff6ff;
    border-radius: 0 4px 4px 0;
  }

  /* Tree-like Hierarchical Indentation */
  .dynamic-toc-menu .depth-2 {
    font-size: 0.85rem;
  }

  .dynamic-toc-menu .depth-3 {
    margin-left: 12px !important;
    border-left: 1px solid #f1f5f9;
    font-size: 0.75rem;
  }

  .dynamic-toc-menu .depth-4 {
    margin-left: 24px !important;
    border-left: 1px dashed #f1f5f9;
    font-size: 0.70rem;
    color: #94a3b8;
  }
</style>

<script>
  (function() {
    try {
      const postBody = document.querySelector('.page__content');
      const tocContainer = document.getElementById('dynamic-toc');
      const asideContainer = document.querySelector('.custom-toc-aside');
      
      if (!postBody) {
        if (asideContainer) asideContainer.style.display = 'none';
        return;
      }

      // Try to find headers. Sometimes markdown generates h1, h2, h3 etc.
      const headers = Array.from(postBody.querySelectorAll('h1, h2, h3, h4, h5, h6'));
      
      // Filter out headers that are empty or part of related posts
      const validHeaders = headers.filter(header => {
        if (header.closest('.page__related') || header.closest('.page__comments') || header.closest('.pagination')) return false;
        const text = (header.textContent || header.innerText || '').trim();
        return text.length > 0;
      });

      if (validHeaders.length === 0 || !tocContainer) {
        if (asideContainer) asideContainer.style.display = 'none';
        return;
      }

      const ul = document.createElement('ul');
      
      validHeaders.forEach(header => {
        let id = header.id;
        if (!id) {
          id = (header.textContent || header.innerText).trim().toLowerCase()
            .replace(/[^a-z0-9\u4e00-\u9fa5]+/gi, '-')
            .replace(/^-|-$/g, '');
          if (!id) id = 'section-' + Math.random().toString(36).substr(2, 9);
          header.id = id;
        }

        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + header.id;
        a.className = 'toc-link';
        a.textContent = (header.textContent || header.innerText).trim();
        
        const tagName = header.tagName.toLowerCase();
        // Base depth styling
        if (tagName === 'h1' || tagName === 'h2') {
          a.classList.add('depth-2');
        } else if (tagName === 'h3') {
          a.classList.add('depth-3');
        } else if (tagName === 'h4' || tagName === 'h5' || tagName === 'h6') {
          a.classList.add('depth-4');
        }

        li.appendChild(a);
        ul.appendChild(li);
      });

      if (ul.children.length === 0) {
        if (asideContainer) asideContainer.style.display = 'none';
        return;
      }

      tocContainer.innerHTML = ''; // clear any existing
      tocContainer.appendChild(ul);
      
      // Ensure the container is visible
      if (asideContainer) {
        asideContainer.style.display = 'block';
      }

      const tocLinks = ul.querySelectorAll('.toc-link');

      function highlightSection() {
        const scrollPosition = window.scrollY || window.pageYOffset;
        const headerThreshold = 120;
        let activeIndex = -1;

        for (let i = 0; i < validHeaders.length; i++) {
          if (!document.getElementById(validHeaders[i].id)) continue;
          const top = validHeaders[i].getBoundingClientRect().top + scrollPosition;
          if (scrollPosition >= top - headerThreshold) {
            activeIndex = i;
          } else {
            break;
          }
        }

        tocLinks.forEach((link, idx) => {
          if (idx === activeIndex || (activeIndex === -1 && idx === 0 && scrollPosition < 100)) {
            if (idx === activeIndex) {
                link.classList.add('active');
            } else if (idx === 0 && activeIndex === -1 && scrollPosition < 100){
                link.classList.remove('active'); 
            } else {
               link.classList.remove('active');
            }
          } else {
            link.classList.remove('active');
          }
        });
      }

      tocLinks.forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const targetId = this.getAttribute('href').substring(1);
          const targetElement = document.getElementById(targetId);
          if (targetElement) {
            const offset = 80;
            const bodyRect = document.body.getBoundingClientRect().top;
            const elementRect = targetElement.getBoundingClientRect().top;
            const offsetPosition = (elementRect - bodyRect) - offset;

            window.scrollTo({
              top: offsetPosition,
              behavior: 'smooth'
            });
            
            history.pushState(null, null, '#' + targetId);
          }
        });
      });

      window.addEventListener('scroll', highlightSection, { passive: true });
      highlightSection();

    } catch (error) {
      console.error("TOC Generation Error:", error);
      const asideContainer = document.querySelector('.custom-toc-aside');
      if (asideContainer) asideContainer.style.display = 'none';
    }
  })();
</script>
