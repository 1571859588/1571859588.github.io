<!-- Fix kramdown stripping backslashes before _ in math spans.
     kramdown treats \_ as a markdown escape, converting $seq\_len$ to $seq_len$.
     MathJax then interprets _ as subscript instead of a literal underscore.
     This runs synchronously before MathJax (async) processes the page. -->
<script>
(function() {
  var content = document.querySelector('.page__content');
  if (!content) return;
  var walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT, null, false);
  var nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(function(node) {
    var text = node.textContent;
    var fixed = text.replace(/\$([^$\n]+?)\$/g, function(match, math) {
      // Inside $...$, add \ before _ followed by 2+ lowercase letters.
      // Safe: legitimate subscripts use single chars ($d_k$) or braces ($x_{ij}$).
      var fixedMath = math.replace(/_([a-z]{2,})/g, '\\_$1');
      return fixedMath !== math ? '$' + fixedMath + '$' : match;
    });
    if (fixed !== text) node.textContent = fixed;
  });
})();
</script>

{% if page.url == '/notes/' %}
<script>
var NOTES_INDEX = [
{% for note in site.notes %}
  {% assign raw = note.content | markdownify | strip_html | strip_newlines | truncate: 3000 | replace: '</', '<\/' %}
  {t:{{ note.title | jsonify }}, s:{{ note.series_title | default: note.series | jsonify }}, u:{{ note.url | relative_url | jsonify }}, c:{{ raw | jsonify }}}{% unless forloop.last %},{% endunless %}
{% endfor %}
];
</script>
<script src="{{ base_path }}/assets/js/notes-search.js"></script>
{% endif %}

<script>
var SERIES_INDEX = [
{% assign sn_notes = site.notes | where: "series", page.series | sort: "series_order" %}
{% for sn in sn_notes %}
  {% assign txt = sn.content | markdownify | strip_html | strip_newlines | truncate: 3000 | replace: '</', '<\/' %}
  {t:{{ sn.title | jsonify }}, u:{{ sn.url | relative_url | jsonify }}, c:{{ txt | jsonify }}}{% unless forloop.last %},{% endunless %}
{% endfor %}
];
(function() {
  if (!SERIES_INDEX.length) return;
  var inp = document.getElementById('notes-sidebar-search-input');
  var box = document.getElementById('notes-sidebar-search-results');
  if (!inp || !box) return;

  function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function hl(t, q) {
    var o = '', L = 0, lo = t.toLowerCase(), ql = q.toLowerCase(), i;
    while ((i = lo.indexOf(ql, L)) !== -1) {
      o += esc(t.substring(L, i)) + '<mark class="notes-search-highlight">' + esc(t.substring(i, i + q.length)) + '</mark>';
      L = i + q.length;
    }
    return o + esc(t.substring(L));
  }

  inp.addEventListener('input', function() {
    var q = this.value.trim();
    if (!q) { box.style.display = 'none'; box.innerHTML = ''; return; }
    var ql = q.toLowerCase(), hits = [];
    for (var i = 0; i < SERIES_INDEX.length; i++) {
      var n = SERIES_INDEX[i], score = 0;
      if (n.t.toLowerCase().indexOf(ql) !== -1) score += 100;
      if (n.c) {
        var ci = n.c.toLowerCase().indexOf(ql);
        if (ci !== -1) { score += 50; n._ctx = n.c.substring(Math.max(0,ci-30), Math.min(n.c.length,ci+q.length+50)); }
      }
      if (score > 0) hits.push(n);
    }
    if (!hits.length) {
      box.innerHTML = '<div class="notes-sidebar-search-empty">无匹配</div>';
    } else {
      var h = '';
      for (var j = 0; j < Math.min(hits.length, 15); j++) {
        var x = hits[j];
        var ctx = x._ctx ? '<span class="notes-sidebar-search-hit-ctx">' + esc(x._ctx) + '</span>' : '';
        h += '<a href="' + x.u + '#q=' + encodeURIComponent(q) + '" class="notes-sidebar-search-hit">' +
             '<span class="notes-sidebar-search-hit-title">' + hl(x.t, q) + '</span>' + ctx + '</a>';
      }
      box.innerHTML = h;
    }
    box.style.display = 'block';
  });
  inp.addEventListener('keydown', function(e) { if (e.key === 'Escape') { box.style.display = 'none'; box.innerHTML = ''; this.blur(); } });
  document.addEventListener('click', function(e) { if (!e.target.closest('#notes-sidebar-search')) { box.style.display = 'none'; box.innerHTML = ''; } });
})();
</script>
